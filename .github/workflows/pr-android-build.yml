name: Android CI (PR)

permissions:
  contents: read

on:
  pull_request:
    branches: [ "main" ]
    paths:
      - 'app/**'
      - 'gradle/**'
      - 'build.gradle.kts'
      - 'gradle.properties'
      - 'settings.gradle.kts'

jobs:
  build:
    environment: pull_requests_build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: |
          ./gradlew assembleDebug assembleRelease \
            --build-cache \
            --parallel \
            --daemon

      - name: Upload Debug APK
        uses: actions/upload-artifact@v7
        with:
          name: onHit-debug
          path: app/build/outputs/apk/debug/*

      - name: Upload Release APK
        uses: actions/upload-artifact@v7
        with:
          name: onHit-release
          path: app/build/outputs/apk/release/*
